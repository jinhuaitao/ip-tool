<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级 IP 地址查询工具</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            flex: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .search-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: none; 
        }

        .ip-display-header {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .main-ip {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            display: inline-block;
            margin-right: 10px;
        }

        .copy-hint {
            font-size: 0.8rem;
            opacity: 0.8;
            display: block;
            margin-top: 5px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .detail-item {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .detail-label {
            font-size: 0.85rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
            word-break: break-all;
        }

        /* --- 新增：IP质量检查样式 --- */
        .quality-section {
            background-color: #f8fafc;
            border-top: 1px solid var(--border-color);
            padding: 20px;
        }

        .quality-title {
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .quality-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .quality-item.safe {
            border-color: #10b981;
            background-color: #ecfdf5;
        }

        .quality-item.risk {
            border-color: #ef4444;
            background-color: #fef2f2;
        }

        .q-label {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 8px;
            display: block;
        }

        .q-status {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .q-status.safe-text { color: #059669; }
        .q-status.risk-text { color: #dc2626; }
        /* --- 新增结束 --- */

        .map-container {
            width: 100%;
            height: 300px;
            background-color: #eee;
            position: relative;
            border-top: 1px solid var(--border-color);
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-sub);
            display: none;
        }

        .error-msg {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-sub);
            font-size: 0.9rem;
            margin-top: auto;
        }

        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 17px;
        }

        .toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }

        @media (max-width: 600px) {
            .main-ip {
                font-size: 1.8rem;
            }
            .details-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>IP 地址查询工具</h1>
        <p style="color: var(--text-sub);">查看您的公网 IP、位置及网络信息</p>
    </header>

    <div class="search-box">
        <input type="text" id="ipInput" placeholder="输入 IPV4或IPV6 地址 ，留空查询本机">
        <button id="searchBtn">查询</button>
        <button id="autoBtn" style="background-color: #4b5563;">自动检测</button>
    </div>

    <div id="loading" class="loading">正在获取数据...</div>
    <div id="errorMsg" class="error-msg"></div>

    <div id="resultCard" class="result-card">
        <div class="ip-display-header">
            <span class="main-ip" id="displayIp" onclick="copyIp()">加载中...</span>
            <span class="copy-hint">点击 IP 地址复制</span>
        </div>
        
        <div class="details-grid">
            <div class="detail-item">
                <div class="detail-label">组织 / ISP</div>
                <div class="detail-value" id="org">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">ASN</div>
                <div class="detail-value" id="asn">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">国家 / 地区</div>
                <div class="detail-value" id="country">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">城市</div>
                <div class="detail-value" id="city">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">省份 / 州</div>
                <div class="detail-value" id="region">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">邮政编码</div>
                <div class="detail-value" id="postal">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">时区</div>
                <div class="detail-value" id="timezone">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">货币</div>
                <div class="detail-value" id="currency">-</div>
            </div>
        </div>

        <div class="quality-section">
            <div class="quality-title">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                IP 质量与安全分析
            </div>
            <div class="quality-grid">
                <div class="quality-item" id="q-proxy">
                    <span class="q-label">代理 / VPN</span>
                    <span class="q-status">检测中...</span>
                </div>
                <div class="quality-item" id="q-tor">
                    <span class="q-label">Tor 匿名节点</span>
                    <span class="q-status">检测中...</span>
                </div>
                <div class="quality-item" id="q-hosting">
                    <span class="q-label">数据中心 (机房)</span>
                    <span class="q-status">检测中...</span>
                </div>
            </div>
        </div>

        <div class="map-container" id="mapContainer">
            </div>
    </div>
</div>

<footer>
    &copy; <script>document.write(new Date().getFullYear())</script> IP Query Tool
</footer>

<div id="toast" class="toast">IP 地址已复制到剪贴板</div>

<script>
    const searchBtn = document.getElementById('searchBtn');
    const autoBtn = document.getElementById('autoBtn');
    const ipInput = document.getElementById('ipInput');
    const resultCard = document.getElementById('resultCard');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');
    const mapContainer = document.getElementById('mapContainer');

    window.addEventListener('DOMContentLoaded', () => {
        fetchMyIP();
    });

    searchBtn.addEventListener('click', () => {
        const ip = ipInput.value.trim();
        if (!ip) {
            showError("请输入一个有效的 IP 地址");
            return;
        }
        fetchIP(ip);
    });

    autoBtn.addEventListener('click', fetchMyIP);

    ipInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchBtn.click();
        }
    });

    async function fetchMyIP() {
        showLoading(true);
        hideError();
        try {
            const response = await fetch('https://ipinfo.io/json');
            if (!response.ok) {
                throw new Error(`API 请求失败 (HTTP 状态码: ${response.status})。可能是当前 IP 被限制。`);
            }
            const data = await response.json();
            updateUI(data);
        } catch (err) {
            showError("无法获取本机 IP: " + err.message);
        } finally {
            showLoading(false);
        }
    }

    async function fetchIP(ip) {
        showLoading(true);
        hideError();
        try {
            const response = await fetch(`https://ipinfo.io/${ip}/json`);
            if (!response.ok) {
                if(response.status === 404) throw new Error("未找到该 IP 地址的信息");
                throw new Error(`API 请求失败 (HTTP 状态码: ${response.status})。`);
            }
            const data = await response.json();
            
            if (data.bogon) {
                throw new Error("这是一个保留/局域网 IP，无法查询物理位置。");
            }
            
            updateUI(data);
        } catch (err) {
            showError(err.message);
            resultCard.style.display = 'none';
        } finally {
            showLoading(false);
        }
    }

    function updateUI(data) {
        document.getElementById('displayIp').textContent = data.ip || '-';
        
        document.getElementById('org').textContent = data.org || '未知';
        
        let asn = '-';
        if (data.org && data.org.toUpperCase().startsWith('AS')) {
            asn = data.org.split(' ')[0]; 
        }
        document.getElementById('asn').textContent = asn;
        
        document.getElementById('country').textContent = data.country || '-';
        document.getElementById('city').textContent = data.city || '-';
        document.getElementById('region').textContent = data.region || '-';
        document.getElementById('postal').textContent = data.postal || '-';
        document.getElementById('timezone').textContent = data.timezone || '-';
        document.getElementById('currency').textContent = '-'; 

        // 触发安全检测
        checkIpQuality(data.ip);

        resultCard.style.display = 'block';

        if (data.loc) {
            const [latStr, lonStr] = data.loc.split(',');
            const lat = parseFloat(latStr);
            const lon = parseFloat(lonStr);
            mapContainer.innerHTML = `
                <iframe 
                    width="100%" 
                    height="100%" 
                    frameborder="0" 
                    scrolling="no" 
                    marginheight="0" 
                    marginwidth="0" 
                    src="https://www.openstreetmap.org/export/embed.html?bbox=${lon-0.05},${lat-0.05},${lon+0.05},${lat+0.05}&layer=mapnik&marker=${lat},${lon}">
                </iframe>
                <div style="text-align:center; padding:5px; font-size:12px; color:#666; position: absolute; bottom: 0; width: 100%; background: rgba(255,255,255,0.8);">
                    <a href="https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=12/${lat}/${lon}" target="_blank">查看大图</a>
                </div>
            `;
        } else {
            mapContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#666;">暂无地图数据</div>';
        }
    }

    // --- 增强版：详细错误捕获 + 双 API 备用容灾 ---
    async function checkIpQuality(ip) {
        const proxyEl = document.getElementById('q-proxy');
        const torEl = document.getElementById('q-tor');
        const hostingEl = document.getElementById('q-hosting');

        // UI 状态重置
        [proxyEl, torEl, hostingEl].forEach(el => {
            el.className = 'quality-item';
            const statusNode = el.querySelector('.q-status');
            statusNode.textContent = '请求中...';
            statusNode.style.color = ''; // 清除之前的错误颜色
            statusNode.style.fontSize = ''; 
        });

        console.log(`[IP 质量检测] 开始分析 IP: ${ip}`);

        try {
            // 前置拦截：过滤无效或局域网 IP
            if (!ip || ip.includes('127.0.0.1') || ip.startsWith('192.168.') || ip.startsWith('10.')) {
                throw new Error("局域网 IP 无安全数据");
            }

            let securityData = null;

            // --- 策略 1: 尝试 ipwho.is ---
            try {
                const response = await fetch(`https://ipwho.is/${ip}`, { signal: AbortSignal.timeout(5000) });
                const data = await response.json();
                if (data.success && data.security) {
                    securityData = {
                        isProxyOrVPN: data.security.proxy || data.security.vpn,
                        isTor: data.security.tor,
                        isHosting: data.security.hosting
                    };
                    console.log("[IP 质量检测] 使用 ipwho.is 获取成功", data.security);
                } else {
                    throw new Error(data.message || "ipwho.is 未返回 security 字段");
                }
            } catch (err1) {
                console.warn(`[IP 质量检测] ipwho.is 请求失败 (${err1.message})，尝试备用 API...`);
                
                // --- 策略 2: 备用回退 api.ipapi.is ---
                const fallbackRes = await fetch(`https://api.ipapi.is/?q=${ip}`, { signal: AbortSignal.timeout(5000) });
                if (!fallbackRes.ok) throw new Error(`双 API 均失效 (HTTP ${fallbackRes.status})`);
                
                const fallbackData = await fallbackRes.json();
                if (fallbackData.ip) {
                    securityData = {
                        isProxyOrVPN: fallbackData.is_proxy || fallbackData.is_vpn,
                        isTor: fallbackData.is_tor,
                        isHosting: fallbackData.is_datacenter
                    };
                    console.log("[IP 质量检测] 使用备用 api.ipapi.is 获取成功", fallbackData);
                } else {
                    throw new Error("备用 API 未返回有效数据");
                }
            }

            // --- 渲染成功数据 ---
            setQualityStatus(proxyEl, securityData.isProxyOrVPN, "检测出代理", "未检测出");
            setQualityStatus(torEl, securityData.isTor, "Tor 节点", "未检测出");
            setQualityStatus(hostingEl, securityData.isHosting, "是 (机房 IP)", "否 (家庭/基站)");

        } catch (err) {
            console.error("[IP 质量检测] 最终失败原因:", err);
            
            // 细化错误提示并显示在 UI 上
            let uiErrorMsg = "检测异常";
            if (err.name === 'AbortError' || err.message.includes('timeout')) {
                uiErrorMsg = "请求超时";
            } else if (err.message.includes('Failed to fetch')) {
                uiErrorMsg = "被浏览器/插件拦截";
            } else if (err.message.includes('局域网')) {
                uiErrorMsg = "本地 IP 忽略";
            } else {
                uiErrorMsg = "API 限流或失效";
            }

            [proxyEl, torEl, hostingEl].forEach(el => {
                const statusSpan = el.querySelector('.q-status');
                statusSpan.textContent = uiErrorMsg;
                statusSpan.style.color = '#d97706'; // 橘黄色警告
                statusSpan.style.fontSize = '0.9rem';
            });
        }
    }

    function setQualityStatus(element, isRisk, riskText, safeText) {
        const statusSpan = element.querySelector('.q-status');
        statusSpan.style.color = ''; // 移除错误状态的内联样式
        statusSpan.style.fontSize = '';
        
        if (isRisk) {
            element.classList.add('risk');
            statusSpan.textContent = riskText;
            statusSpan.classList.add('risk-text');
        } else {
            element.classList.add('safe');
            statusSpan.textContent = safeText;
            statusSpan.classList.add('safe-text');
        }
    }
    // --- 新增结束 ---

    function showLoading(isLoading) {
        loading.style.display = isLoading ? 'block' : 'none';
        searchBtn.disabled = isLoading;
        autoBtn.disabled = isLoading;
        if(!isLoading) resultCard.style.display = 'block'; 
    }

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
    }

    function hideError() {
        errorMsg.style.display = 'none';
    }

    function copyIp() {
        const ipText = document.getElementById('displayIp').textContent;
        navigator.clipboard.writeText(ipText).then(() => {
            showToast();
        }).catch(err => {
            console.error('复制失败', err);
        });
    }

    function showToast() {
        const toast = document.getElementById("toast");
        toast.className = "toast show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
    }
</script>

</body>
</html>
