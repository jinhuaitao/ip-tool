<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级 IP 地址查询工具</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            flex: 1;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .search-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: none; /* Hidden by default */
        }

        .ip-display-header {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .main-ip {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            display: inline-block;
            margin-right: 10px;
        }

        .copy-hint {
            font-size: 0.8rem;
            opacity: 0.8;
            display: block;
            margin-top: 5px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .detail-item {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .detail-label {
            font-size: 0.85rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
            word-break: break-all;
        }

        .map-container {
            width: 100%;
            height: 300px;
            background-color: #eee;
            position: relative;
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-sub);
            display: none;
        }

        .error-msg {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-sub);
            font-size: 0.9rem;
            margin-top: auto;
        }

        /* Toast Notification */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 17px;
        }

        .toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }

        @media (max-width: 600px) {
            .main-ip {
                font-size: 1.8rem;
            }
            .details-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>IP 地址查询工具</h1>
        <p style="color: var(--text-sub);">查看您的公网 IP、位置及网络信息</p>
    </header>

    <div class="search-box">
        <input type="text" id="ipInput" placeholder="输入 IPV4或IPV6 地址 ，留空查询本机">
        <button id="searchBtn">查询</button>
        <button id="autoBtn" style="background-color: #4b5563;">自动检测</button>
    </div>

    <div id="loading" class="loading">正在获取数据...</div>
    <div id="errorMsg" class="error-msg"></div>

    <div id="resultCard" class="result-card">
        <div class="ip-display-header">
            <span class="main-ip" id="displayIp" onclick="copyIp()">加载中...</span>
            <span class="copy-hint">点击 IP 地址复制</span>
        </div>
        
        <div class="details-grid">
            <div class="detail-item">
                <div class="detail-label">组织 / ISP</div>
                <div class="detail-value" id="org">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">ASN</div>
                <div class="detail-value" id="asn">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">国家 / 地区</div>
                <div class="detail-value" id="country">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">城市</div>
                <div class="detail-value" id="city">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">省份 / 州</div>
                <div class="detail-value" id="region">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">邮政编码</div>
                <div class="detail-value" id="postal">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">时区</div>
                <div class="detail-value" id="timezone">-</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">货币</div>
                <div class="detail-value" id="currency">-</div>
            </div>
        </div>

        <div class="map-container" id="mapContainer">
            <!-- Map will be injected here -->
        </div>
    </div>
</div>

<footer>
    &copy; <script>document.write(new Date().getFullYear())</script> IP Query Tool
</footer>

<div id="toast" class="toast">IP 地址已复制到剪贴板</div>

<script>
    const searchBtn = document.getElementById('searchBtn');
    const autoBtn = document.getElementById('autoBtn');
    const ipInput = document.getElementById('ipInput');
    const resultCard = document.getElementById('resultCard');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');
    const mapContainer = document.getElementById('mapContainer');

    // 初始化：页面加载时自动查询本机 IP
    window.addEventListener('DOMContentLoaded', () => {
        fetchMyIP();
    });

    // 事件监听
    searchBtn.addEventListener('click', () => {
        const ip = ipInput.value.trim();
        if (!ip) {
            showError("请输入一个有效的 IP 地址");
            return;
        }
        fetchIP(ip);
    });

    autoBtn.addEventListener('click', fetchMyIP);

    ipInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchBtn.click();
        }
    });

    // 获取本机 IP
    async function fetchMyIP() {
        showLoading(true);
        hideError();
        try {
            // 更换为极度稳定的 ipinfo.io 接口
            const response = await fetch('https://ipinfo.io/json');
            if (!response.ok) {
                throw new Error(`API 请求失败 (HTTP 状态码: ${response.status})。可能是当前 IP 被限制。`);
            }
            const data = await response.json();
            updateUI(data);
        } catch (err) {
            showError("无法获取本机 IP: " + err.message);
        } finally {
            showLoading(false);
        }
    }

    // 获取指定 IP
    async function fetchIP(ip) {
        showLoading(true);
        hideError();
        try {
            const response = await fetch(`https://ipinfo.io/${ip}/json`);
            if (!response.ok) {
                if(response.status === 404) throw new Error("未找到该 IP 地址的信息");
                throw new Error(`API 请求失败 (HTTP 状态码: ${response.status})。`);
            }
            const data = await response.json();
            
            // ipinfo 会将局域网 IP 标记为 bogon
            if (data.bogon) {
                throw new Error("这是一个保留/局域网 IP，无法查询物理位置。");
            }
            
            updateUI(data);
        } catch (err) {
            showError(err.message);
            resultCard.style.display = 'none';
        } finally {
            showLoading(false);
        }
    }

    // 更新界面 (适应 ipinfo.io 的数据结构)
    function updateUI(data) {
        document.getElementById('displayIp').textContent = data.ip || '-';
        
        // ipinfo 免费版将 ASN 和组织名称合并在 org 字段中
        document.getElementById('org').textContent = data.org || '未知';
        
        let asn = '-';
        if (data.org && data.org.toUpperCase().startsWith('AS')) {
            asn = data.org.split(' ')[0]; // 提取类似于 "AS15169" 的部分
        }
        document.getElementById('asn').textContent = asn;
        
        document.getElementById('country').textContent = data.country || '-';
        document.getElementById('city').textContent = data.city || '-';
        document.getElementById('region').textContent = data.region || '-';
        document.getElementById('postal').textContent = data.postal || '-';
        document.getElementById('timezone').textContent = data.timezone || '-';
        document.getElementById('currency').textContent = '-'; // ipinfo 免费版暂不提供货币数据

        // 显示卡片
        resultCard.style.display = 'block';

        // 渲染地图 (ipinfo 使用 "纬度,经度" 格式的 loc 字段)
        if (data.loc) {
            const [latStr, lonStr] = data.loc.split(',');
            const lat = parseFloat(latStr);
            const lon = parseFloat(lonStr);
            mapContainer.innerHTML = `
                <iframe 
                    width="100%" 
                    height="100%" 
                    frameborder="0" 
                    scrolling="no" 
                    marginheight="0" 
                    marginwidth="0" 
                    src="https://www.openstreetmap.org/export/embed.html?bbox=${lon-0.05},${lat-0.05},${lon+0.05},${lat+0.05}&layer=mapnik&marker=${lat},${lon}">
                </iframe>
                <div style="text-align:center; padding:5px; font-size:12px; color:#666;">
                    <a href="https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=12/${lat}/${lon}" target="_blank">查看大图</a>
                </div>
            `;
        } else {
            mapContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#666;">暂无地图数据</div>';
        }
    }

    // 辅助功能：显示/隐藏加载状态
    function showLoading(isLoading) {
        loading.style.display = isLoading ? 'block' : 'none';
        searchBtn.disabled = isLoading;
        autoBtn.disabled = isLoading;
        if(!isLoading) resultCard.style.display = 'block'; // 保持显示
    }

    // 辅助功能：显示错误
    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
    }

    function hideError() {
        errorMsg.style.display = 'none';
    }

    // 辅助功能：复制 IP
    function copyIp() {
        const ipText = document.getElementById('displayIp').textContent;
        navigator.clipboard.writeText(ipText).then(() => {
            showToast();
        }).catch(err => {
            console.error('复制失败', err);
        });
    }

    function showToast() {
        const toast = document.getElementById("toast");
        toast.className = "toast show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
    }
</script>

</body>
</html>
